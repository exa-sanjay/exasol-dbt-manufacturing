name: 'manufacturing_analytics'
version: '1.0.0'
config-version: 2

profile: 'manufacturing_analytics'

model-paths:  ["models"]
test-paths:   ["tests"]
seed-paths:   ["seeds"]
macro-paths:  ["macros"]

target-path:  "target"
clean-targets: ["target", "dbt_packages"]

vars:
  # Anomaly detection thresholds — override at run time with --vars '{"temp_anomaly_ratio": 1.20}'
  temp_anomaly_ratio: 1.15   # fire when max_temp > avg_temp * this factor
  vib_anomaly_ratio:  1.50   # fire when max_vibration > avg_vibration * this factor

models:
  manufacturing_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
