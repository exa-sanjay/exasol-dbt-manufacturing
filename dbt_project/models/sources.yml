version: 2

sources:
  - name: erp_pg
    description: >
      ERP / MES data from PostgreSQL, federated into Exasol
      via Virtual Schema (no data movement).
    database: EXA_DB
    schema: ERP_PG        # Exasol Virtual Schema name
    tables:
      - name: machines
        description: "Machine master data — one row per physical machine."
        columns:
          - name: machine_id
            description: "Surrogate PK (PostgreSQL SERIAL)."
            tests:
              - unique
              - not_null
          - name: theoretical_rate_per_hr
            description: "Max units per hour at 100% performance."

      - name: production_orders
        description: "One row per machine per shift (8-hour window)."
        columns:
          - name: order_id
            tests: [unique, not_null]
          - name: machine_id
            tests: [not_null]
          - name: actual_qty
            tests: [not_null]

      - name: defects
        description: "Quality defects detected during a production order."
        columns:
          - name: defect_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]

  - name: iot
    description: >
      High-volume IoT data stored natively in Exasol
      (sensor readings and downtime events).
    database: EXA_DB
    schema: IOT_RAW
    tables:
      - name: sensor_readings
        description: "One row per machine per 5-minute interval."
        columns:
          - name: machine_id
            tests: [not_null]
          - name: ts
            tests: [not_null]

      - name: downtime_events
        description: "Unplanned stoppages detected from sensor anomalies."
        columns:
          - name: event_id
            tests: [unique, not_null]
          - name: machine_id
            tests: [not_null]

  - name: ai
    description: >
      AI_SCHEMA tables written by factory_ai_agent.py — the Self-Healing Factory AI System.
      FAILURE_PATTERNS stores nomic-embed-text embeddings (768-dimensional, via Ollama).
      MAINTENANCE_RECOMMENDATIONS stores Ollama-generated root cause analysis per at-risk machine.
    database: EXA_DB
    schema: AI_SCHEMA
    tables:
      - name: failure_patterns
        description: >
          nomic-embed-text embedding (768-dimensional) per historical downtime event.
          Stored in Exasol as a comma-separated VARCHAR; cosine similarity is ranked in Python (numpy).
        columns:
          - name: pattern_id
            tests: [unique, not_null]
          - name: machine_id
            tests: [not_null]

      - name: maintenance_recommendations
        description: >
          AI-generated maintenance work orders — root cause, action, estimated time-to-failure.
          Written by factory_ai_agent.py using qwen2.5:7b via local Ollama.
          Re-runs are idempotent: today's row per machine is deleted before re-insert.
        columns:
          - name: rec_id
            tests: [unique, not_null]
          - name: machine_id
            tests: [not_null]
          - name: root_cause
            tests: [not_null]
          - name: recommended_action
            tests: [not_null]
          - name: confidence
            tests:
              - not_null
              - accepted_values:
                  values: ['HIGH', 'MEDIUM', 'LOW']
          - name: estimated_hours_to_failure
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 1
                  max_value: 720
